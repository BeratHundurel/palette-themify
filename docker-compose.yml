services:
  postgres:
    image: postgres:17-alpine
    container_name: image-to-palette-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-image_to_palette}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d image_to_palette"]
      interval: 5s
      timeout: 5s
      retries: 10

  go-api:
    image: golang:1.26.2-alpine
    container_name: image-to-palette-go-api
    working_dir: /app
    command: sh -c "go mod download && go run ."
    volumes:
      - ./api/go:/app
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: "${DB_PORT:-5432}"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_NAME: ${DB_NAME:-image_to_palette}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8088/auth/google/callback}
      JWT_SECRET: ${JWT_SECRET:-change-me}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy

  zig-api:
    build:
      context: ./api/zig
      dockerfile: Dockerfile
    container_name: image-to-palette-zig-api
    working_dir: /app
    command: zig build run --cache-dir /tmp/zig-local-cache --global-cache-dir /tmp/zig-global-cache
    volumes:
      - ./api/zig:/app
    environment:
      ZIG_LOCAL_CACHE_DIR: /tmp/zig-local-cache
      ZIG_GLOBAL_CACHE_DIR: /tmp/zig-global-cache
    ports:
      - "8089:8089"

  frontend:
    image: node:24-alpine
    container_name: image-to-palette-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8088}
      VITE_ZIG_API_BASE_URL: ${VITE_ZIG_API_BASE_URL:-http://localhost:8089}
    ports:
      - "5173:5173"
    depends_on:
      - go-api
      - zig-api

volumes:
  postgres_data:
