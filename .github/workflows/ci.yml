name: CI

on:
  push:
  pull_request:

jobs:
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type checks
        run: npm run check

      - name: Run lint checks
        run: npm run lint

      - name: Run unit tests
        run: npm run test

  go-tests:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Run tests
        run: go test ./...

  zig-tests:
    name: Zig tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/zig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Run tests
        run: zig build test
